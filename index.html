<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="terceiro projeto, cartão de crédito, css e html">
    <meta name="keywords" content="html,css,design">
    <meta name="author" content="Lia Alvarez">
    <meta name="robots" content="index, follow">
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <title>Cartão de crédito Ui Design</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <span class="logo">
                <img src="img/logo.png" alt="Imagem da logo do Master Card">
                <h5>Master Card</h5>
            </span>
            <img src="img/chip.png" alt="imagem do chip do cartão" class="chip">
        </header>

        <div class="card-details">
            <div class="name-number">
                <h6>Número do cartão</h6>
                <h5 class="number">8050 50 40 2030 3020</h5>
                <h5 class="name">Lia Alvarez</h5>
            </div>
            <div class="valid-date">~
                <h6>Validade</h6>
                <h5>05/28</h5>
            </div>
        </div>
    </div>
</body>
</html>
